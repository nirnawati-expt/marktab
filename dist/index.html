  <style>/* style/typography.css */
#editor {
  font-family: Source Code Pro, monospace;
}

.preview-content {
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Noto Sans, Ubuntu, Cantarell, Helvetica Neue, sans-serif;
}

.dyslexic-mode .preview-content, .dyslexic-mode .preview-content * {
  font-family: Open-Dyslexic, sans-serif !important;
  line-height: 2 !important;
}

.dyslexic-mode #editor {
  line-height: 2.3 !important;
}

.preview-content h1, .preview-content h2, .preview-content h3, .preview-content h4, .preview-content h5 {
  position: relative;
}

.preview-content h1 {
  border-bottom: 1px solid var(--color-border);
  margin-bottom: 1rem;
  padding-bottom: .25rem;
  font-size: 2rem;
  font-weight: 700;
}

.preview-content h2 {
  border-bottom: 1px solid var(--color-border);
  margin-bottom: .75rem;
  padding-bottom: .25rem;
  font-size: 1.5rem;
  font-weight: 600;
}

.preview-content h3 {
  margin-bottom: .5rem;
  font-size: 1.25rem;
  font-weight: 500;
}

.preview-content h4 {
  margin-bottom: .5rem;
  font-size: 1.125rem;
  font-weight: 500;
}

.preview-content h5 {
  color: var(--color-text-muted);
  margin-bottom: .5rem;
  font-size: 1rem;
  font-weight: 600;
}

.preview-content p {
  margin-bottom: 1rem;
  line-height: 1.625;
}

.preview-content ul {
  list-style-type: disc;
  margin-bottom: 1rem;
  padding-left: 1.5rem;
}

.preview-content ol {
  list-style-type: decimal;
  margin-bottom: 1rem;
  padding-left: 1.5rem;
}

.preview-content li {
  margin-bottom: .25rem;
}

.preview-content code {
  background-color: var(--color-bg-code);
  color: var(--color-text-code);
  border-radius: .25rem;
  padding: .125rem .25rem;
  font-family: Source Code Pro, monospace;
  font-size: .875rem;
}

.preview-content pre {
  background-color: var(--color-bg-block);
  color: var(--color-text-block);
  overflow-x: auto;
  border: 1px solid var(--color-border);
  border-radius: .375rem;
  margin-bottom: 1rem;
  padding: 1rem;
}

.preview-content pre code {
  color: inherit;
  background-color: #0000;
  padding: 0;
  font-size: .875rem;
}

.preview-content blockquote {
  border-left: 4px solid var(--color-bg-block-muted);
  color: var(--color-text-block-muted);
  margin: 1rem 0;
  padding-left: 1rem;
  font-style: italic;
}

.preview-content a {
  color: var(--color-accent);
  text-decoration: underline;
}

.preview-content table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 1rem;
}

.preview-content th, .preview-content td {
  border: 1px solid var(--color-bg-muted);
  padding: .5rem .75rem;
}

.preview-content th {
  background-color: var(--color-bg);
  text-align: left;
  font-weight: 600;
}

.preview-content mark {
  background-color: var(--color-bg-vivid);
  color: var(--color-text-vivid);
  border-radius: .125rem;
  padding: 0 .25rem;
}

/* style/variable.css */
:root {
  --color-bg: #faf9f6;
  --color-text: #2d2d2a;
  --color-bg-muted: #f1f0ea;
  --color-text-muted: #6e6e66;
  --color-bg-block: #fff;
  --color-text-block: #2d2d2a;
  --color-bg-block-muted: #f5f4ef;
  --color-text-block-muted: #8b8a82;
  --color-bg-vivid: #fef9e7;
  --color-text-vivid: #b28a00;
  --color-bg-code: #f3f2eb;
  --color-text-code: #547f00;
  --color-accent: #d33f6a;
  --color-border: #e2dfd5;
}

html.dark {
  --color-bg: #272822;
  --color-text: #f8f8f2;
  --color-bg-muted: #3e3d32;
  --color-text-muted: #8f908a;
  --color-bg-block: #1e1f1c;
  --color-text-block: #f8f8f2;
  --color-bg-block-muted: #2d2e2b;
  --color-text-block-muted: #75715e;
  --color-bg-vivid: #e6db7422;
  --color-text-vivid: #e6db74;
  --color-bg-code: #23241f;
  --color-text-code: #a6e22e;
  --color-accent: #f92672;
  --color-border: #49483e;
}

/* style/index.css */
#preview {
  content-visibility: auto;
  contain-intrinsic-size: 100px 500px;
}

.preview-content img {
  display: block;
  background-color: #f3f4f6;
  border-radius: .375rem;
  max-width: 100%;
  height: auto;
}

html.dark .preview-content img {
  background-color: #1f2937;
}

.preview-content img:not([width]):not([height]) {
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.preview-content img:complete {
  aspect-ratio: auto;
  object-fit: contain;
}
</style></head>
  <body
    class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 overflow-hidden"
  >
    <nav

      <textarea
        id="editor"

        placeholder="Type your Markdown code here..."
      >
# Markdown Cheat Sheet

Guide from [The Markdown Guide](https://www.markdownguide.org)

## Basic Syntax

These are the elements outlined in John Gruber’s original design document. All Markdown applications support these elements.

### Heading

# H1
## H2
### H3
#### H4
##### H5

### Bold

**bold text**

### Italic

*italicized text*

### Blockquote

> blockquote

### Ordered List

1. First item
2. Second item
3. Third item

### Unordered List

- First item
- Second item
- Third item

### Code

`code`

### Horizontal Rule

---

### Link

[Markdown Guide](https://www.markdownguide.org)

### Image

![alt text](https://www.markdownguide.org/assets/images/tux.png)

## Extended Syntax

These elements extend the basic syntax by adding additional features. Not all Markdown applications support these elements.

### Table

| Syntax | Description |
| ----------- | ----------- |
| Header | Title |
| Paragraph | Text |

### Fenced Code Block

```
{
  "firstName": "John",
  "lastName": "Smith",
  "age": 25
}
```

### Footnote ❌ NOT SUPPORTED

### Heading ID

### My Great Heading {#custom-id}

### Definition List

term
: definition

### Strikethrough

~~The world is flat.~~

### Task List

- [x] Write the press release
- [ ] Update the website
- [ ] Contact the media

### Emoji ❌ NOT SUPPORTED

### Highlight

I need to highlight these ==very important words==.

### Subscript

H~2~O

### Superscript

X^2^

go to [custom heading](.#custom-heading)

go to [basic syntax](.#basic-syntax)

  <script type="module">// script.js
tailwind.config = {
  darkMode: "class"
};
var editor = document.getElementById("editor");
var preview = document.getElementById("preview");
var previewContainer = document.getElementById("preview-container");
var toggleEditorBtn = document.getElementById("toggle-editor-btn");
var togglePreviewBtn = document.getElementById("toggle-preview-btn");
var themeBtn = document.getElementById("theme-btn");
var dyslexicBtn = document.getElementById("dyslexic-btn");
var copyMDBtn = document.getElementById("copy-md-btn");
var copyHTMLBtn = document.getElementById("copy-html-btn");
var downloadMDBtn = document.getElementById("download-md-btn");
var htmlTag = document.documentElement;
var isSourceScroll = false;
marked.use({
  hooks: {
    postprocess(html) {
      let processedHtml = html.replace(/<h([1-6])>(.*?)\s*\{#([^\}]+)\}<\/h\1>/g, (match, level, content, id) => {
        const cleanId = id.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "").replace(/[\s_]+/g, "-");
        return `<h${level} id="${cleanId}" class="group relative flex items-center"><a href="javascript:void(0)" onclick="document.getElementById('${cleanId}').scrollIntoView({behavior: 'smooth'})" class="absolute -left-5 opacity-0 group-hover:opacity-100 text-blue-500 no-underline font-normal text-base pr-2 transition-opacity duration-150" aria-hidden="false">#</a><span>${content}</span></h${level}>`;
      });
      processedHtml = processedHtml.replace(/<h([1-6])(?![^>]*\bid=)>(.*?)<\/h\1>/g, (match, level, content) => {
        const id = content.replace(/<[^>]*>/g, "").toLowerCase().trim().replace(/[^\w\s-]/g, "").replace(/[\s_]+/g, "-");
        return `<h${level} id="${id}" class="group relative flex items-center"><a href="javascript:void(0)" onclick="document.getElementById('${id}').scrollIntoView({behavior: 'smooth'})" class="absolute -left-5 opacity-0 group-hover:opacity-100 text-blue-500 no-underline font-normal text-base pr-2 transition-opacity duration-150" aria-hidden="false">#</a><span>${content}</span></h${level}>`;
      });
      processedHtml = processedHtml.replace(/==([^=]+)==/g, "<mark>$1</mark>").replace(/\^([^^]+)\^/g, "<sup>$1</sup>").replace(/<del>([\s\S]*?)<\/del>/g, "<sub>$1</sub>");
      return processedHtml;
    }
  }
});
function renderMarkdown() {
  preview.innerHTML = marked.parse(editor.value);
  preview.querySelectorAll("img").forEach((img) => {
    if (!img.getAttribute("width") && !img.getAttribute("height")) {
      img.addEventListener("load", function() {
        img.setAttribute("width", img.naturalWidth);
        img.setAttribute("height", img.naturalHeight);
      }, { once: true });
    }
  });
}
function debounce(func, timeout = 150) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      func.apply(this, args);
    }, timeout);
  };
}
editor.addEventListener("input", debounce(renderMarkdown, 150));
editor.addEventListener("scroll", () => {
  if (isSourceScroll || previewContainer.classList.contains("hidden"))
    return;
  isSourceScroll = true;
  const scrollPercentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
  previewContainer.scrollTop = scrollPercentage * (previewContainer.scrollHeight - previewContainer.clientHeight);
  setTimeout(() => isSourceScroll = false, 50);
});
previewContainer.addEventListener("scroll", () => {
  if (isSourceScroll || editor.classList.contains("hidden"))
    return;
  isSourceScroll = true;
  const scrollPercentage = previewContainer.scrollTop / (previewContainer.scrollHeight - previewContainer.clientHeight);
  editor.scrollTop = scrollPercentage * (editor.scrollHeight - editor.clientHeight);
  setTimeout(() => isSourceScroll = false, 50);
});
function updateButtonStates() {
  const isEditorHidden = editor.classList.contains("hidden");
  const isPreviewHidden = previewContainer.classList.contains("hidden");
  togglePreviewBtn.disabled = isEditorHidden;
  toggleEditorBtn.disabled = isPreviewHidden;
}
toggleEditorBtn.addEventListener("click", () => {
  if (editor.classList.contains("hidden")) {
    editor.classList.remove("hidden");
    previewContainer.classList.replace("w-full", "w-1/2");
    toggleEditorBtn.innerText = "Hide Editor";
  } else {
    editor.classList.add("hidden");
    previewContainer.classList.replace("w-1/2", "w-full");
    toggleEditorBtn.innerText = "Show Editor";
  }
  updateButtonStates();
});
togglePreviewBtn.addEventListener("click", () => {
  if (previewContainer.classList.contains("hidden")) {
    previewContainer.classList.remove("hidden");
    editor.classList.replace("w-full", "w-1/2");
    togglePreviewBtn.innerText = "Hide Preview";
  } else {
    previewContainer.classList.add("hidden");
    editor.classList.replace("w-1/2", "w-full");
    togglePreviewBtn.innerText = "Show Preview";
  }
  updateButtonStates();
});
themeBtn.addEventListener("click", () => {
  if (htmlTag.classList.contains("dark")) {
    htmlTag.classList.remove("dark");
    themeBtn.innerText = "☀️";
    themeBtn.ariaLabel = "current-mode-light";
  } else {
    htmlTag.classList.add("dark");
    themeBtn.innerText = "\uD83C\uDF19";
    themeBtn.ariaLabel = "current-mode-dark";
  }
});
dyslexicBtn.addEventListener("click", () => {
  if (document.body.classList.contains("dyslexic-mode")) {
    document.body.classList.remove("dyslexic-mode");
    dyslexicBtn.innerText = "Easy Read OFF";
    dyslexicBtn.classList.add("bg-orange-800");
    dyslexicBtn.classList.add("hover:bg-orange-900");
    dyslexicBtn.classList.remove("bg-orange-600");
    dyslexicBtn.classList.remove("hover:bg-orange-700");
    previewContainer.classList.remove("p-10");
    previewContainer.classList.add("p-6");
    editor.classList.add("dyslexic-mode");
  } else {
    document.body.classList.add("dyslexic-mode");
    dyslexicBtn.innerText = "Easy Read ON";
    dyslexicBtn.classList.add("bg-orange-600");
    dyslexicBtn.classList.add("hover:bg-orange-700");
    dyslexicBtn.classList.remove("bg-orange-800");
    dyslexicBtn.classList.remove("hover:bg-orange-900");
    editor.classList.remove("dyslexic-mode");
    previewContainer.classList.add("p-10");
    previewContainer.classList.remove("p-6");
  }
});
copyMDBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(editor.value);
    const originalText = copyMDBtn.innerText;
    copyMDBtn.innerText = "Copied!";
    setTimeout(() => copyMDBtn.innerText = originalText, 2000);
  } catch (err) {
    alert("Gagal menyalin teks");
  }
});
copyHTMLBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(preview.innerHTML);
    const originalText = copyHTMLBtn.innerText;
    copyHTMLBtn.innerText = "Copied!";
    setTimeout(() => copyHTMLBtn.innerText = originalText, 2000);
  } catch (err) {
    alert("Gagal menyalin HTML");
  }
});
downloadMDBtn.addEventListener("click", () => {
  const blob = new Blob([editor.value], {
    type: "text/markdown;charset=utf-8;"
  });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const firstLine = editor.value.trim().split(`
`)[0];
  const fileName = firstLine.startsWith("#") ? firstLine.replace(/^#+\s*/, "").trim().toLowerCase().replace(/[^a-z0-9]/g, "-") : "document";
  link.href = url;
  link.download = `${fileName || "document"}.md`;
  link.style.display = "none";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});
renderMarkdown();
var zoomInBtn = document.getElementById("zoom-in-btn");
var zoomOutBtn = document.getElementById("zoom-out-btn");
var currentZoom = 100;
function applyZoom() {
  editor.style.fontSize = `${0.875 * (currentZoom / 100)}rem`;
  preview.style.fontSize = `${1 * (currentZoom / 100)}rem`;
}
zoomInBtn.addEventListener("click", () => {
  if (currentZoom < 200) {
    currentZoom += 10;
    applyZoom();
  }
});
zoomOutBtn.addEventListener("click", () => {
  if (currentZoom > 70) {
    currentZoom -= 10;
    applyZoom();
  }
});
</script></body>
