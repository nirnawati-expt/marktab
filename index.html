<!doctype html>
<html lang="en" class="light">
  <head>
    <meta
      name="description"
      content="MarkTab a free ultra-light markdown editor and viewer"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✒️</text></svg>"
    />
    <title>MarkTab: Free, Lightweight & Secure Markdown Live Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
    />
    <link
      href="https://fonts.cdnfonts.com/css/open-dyslexic"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link href="style/index.css" rel="stylesheet" />
    <script src="script.js" defer></script>
  </head>
  <body
    class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 overflow-hidden"
  >
    <nav
      class="h-14 bg-gray-600 text-white flex items-center justify-between px-4 z-40 shrink-0 shadow-md"
    >
      <div class="text-lg font-bold tracking-wide">✒️ MarkTab</div>

      <div class="flex items-center space-x-2">
        <button
          id="zoom-in-btn"
          class="px-3 py-1.5 text-xs font-bold bg-gray-700 hover:bg-gray-800 rounded transition text-white"
        >
          Zoom In
        </button>
        <button
          id="zoom-out-btn"
          class="px-3 py-1.5 text-xs font-bold bg-gray-700 hover:bg-gray-800 rounded transition text-white"
        >
          Zoom Out
        </button>
        <button
          id="toggle-editor-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-gray-700 hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed rounded transition text-white"
        >
          Hide Editor
        </button>
        <button
          id="toggle-preview-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-gray-700 hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed rounded transition text-white"
        >
          Hide Preview
        </button>
        <button
          id="theme-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-gray-700 hover:bg-gray-800 rounded transition text-white"
        >
          ☀️
        </button>
        <button
          id="dyslexic-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-orange-800 hover:bg-orange-900 text-white rounded transition"
        >
          Easy Read OFF
        </button>
        <button
          id="copy-md-btn"
          class="px-3 py-1.5 text-xs font-medium bg-gray-700 hover:bg-gray-800 rounded transition text-white"
        >
          Copy Markdown
        </button>
        <button
          id="copy-html-btn"
          class="px-3 py-1.5 text-xs font-medium bg-gray-700 hover:bg-gray-800 rounded transition text-white"
        >
          Copy HTML
        </button>
        <button
          id="download-md-btn"
          class="px-3 py-1.5 text-xs font-medium bg-emerald-600 hover:bg-emerald-700 rounded transition text-white"
        >
          Download .md
        </button>
        <button
          id="download-html-btn"
          class="px-3 py-1.5 text-xs font-medium bg-blue-600 hover:bg-blue-700 rounded transition text-white"
        >
          Download .html
        </button>
      </div>
    </nav>

    <main class="flex flex-1 h-[calc(100vh-3.5rem)] overflow-hidden relative">
      <textarea
        id="editor"
        class="w-1/2 h-full p-6 font-mono text-sm resize-none focus:outline-none bg-gray-950 text-gray-100 border-r border-gray-800 leading-relaxed transition-all duration-300"
        placeholder="Type your Markdown code here..."
      >
# Markdown Cheat Sheet

Guide from [The Markdown Guide](https://www.markdownguide.org)

## Basic Syntax

These are the elements outlined in John Gruber’s original design document. All Markdown applications support these elements.

### Heading

# H1
## H2
### H3
#### H4
##### H5

### Bold

**bold text**

### Italic

*italicized text*

### Blockquote

> blockquote

### Ordered List

1. First item
2. Second item
3. Third item

### Unordered List

- First item
- Second item
- Third item

### Code

`code`

### Horizontal Rule

---

### Link

[Markdown Guide](https://www.markdownguide.org)

### Image

![alt text](https://www.markdownguide.org/assets/images/tux.png)

## Extended Syntax

These elements extend the basic syntax by adding additional features. Not all Markdown applications support these elements.

### Table

| Syntax | Description |
| ----------- | ----------- |
| Header | Title |
| Paragraph | Text |

### Fenced Code Block

```
{
  "firstName": "John",
  "lastName": "Smith",
  "age": 25
}
```

### Footnote ❌ NOT SUPPORTED

### Heading ID

### My Great Heading {#custom-id}

### Definition List

term
: definition

### Strikethrough

~~The world is flat.~~

### Task List

- [x] Write the press release
- [ ] Update the website
- [ ] Contact the media

### Emoji ❌ NOT SUPPORTED

### Highlight

I need to highlight these ==very important words==.

### Subscript

H~2~O

### Superscript

X^2^

go to [custom heading](.#custom-heading)

go to [basic syntax](.#basic-syntax)
      </textarea>
      <div
        id="preview-container"
        class="w-1/2 h-full overflow-y-auto p-6 bg-white dark:bg-gray-900 relative transition-all duration-300"
      >
        <div id="preview" class="preview-content max-w-none"></div>
      </div>
    </main>
  </body>
</html>
